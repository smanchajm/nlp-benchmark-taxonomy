project: nlp-benchmark-classification-scibert
program: src.training.trainer
method: bayes
run_cap: 25
metric:
  name: best_val_f1
  goal: maximize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 5.0e-5
  weight_decay:
    values: [0.01, 0.03, 0.1]
  class_weight_smoothing:
    distribution: uniform
    min: 0.0
    max: 1.0
  per_device_train_batch_size:
    values: [8, 16, 32]
  warmup_steps:
    values: [0, 25, 50, 100]

command:
  - ${env}
  - python
  - -m
  - ${program}
  - --sweep
  - --config
  - config/scibert.yaml
