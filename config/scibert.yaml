model:
  pretrained: "allenai/scibert_scivocab_uncased"
  max_length: 512
  output_dir: "data/models/scibert"
  num_train_epochs: 10
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.03
  warmup_steps: 50
  seed: 42
  num_labels: 2
  class_weight_smoothing: 0.5
  early_stopping_patience: 2
  wandb_project: "nlp-benchmark-classification-scibert-augmented-bucket_a_b"
